services:
  chromadb:
    image: chromadb/chroma:1.5.8
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_data:/chroma/chroma
    networks:
      - rag-network

  langflow:
    image: langflowai/langflow:1.9.1
    ports:
      - "7860:7860"
    depends_on:
      - chromadb
    restart: on-failure
    environment:
      - LANGFLOW_CONFIG_DIR=/app/langflow
    env_file:
      - path: .env
        required: false
    volumes:
      - ./langflow_data:/app/langflow
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge
